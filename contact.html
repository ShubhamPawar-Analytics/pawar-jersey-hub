  <main class="main-content" id="main-content" data-page="contact">
    <section class="contact-section" id="contact-section" data-section="contact">
      <h1 class="page-title contact-page-title" id="page-title-contact">Contact Us</h1>
      <p class="contact-intro" id="contact-intro">Submit the form and we'll get back to you.</p>
      <form id="contact-form" class="form-max-width contact-form" data-step="contact_form" data-section="contact_form">
        <div id="contact-form-feedback" class="form-message hidden" role="alert" data-message-type="contact_feedback"></div>
        <div class="form-group">
          <label for="contact-name" id="label-contact-name">Name *</label>
          <input type="text" id="contact-name" name="name" required placeholder="Your name" autocomplete="name" data-field="name" />
        </div>
        <div class="form-group">
          <label for="contact-email" id="label-contact-email">Email *</label>
          <input type="email" id="contact-email" name="email" required placeholder="your@email.com" autocomplete="email" data-field="email" />
        </div>
        <div class="form-group">
          <label for="contact-subject" id="label-contact-subject">Subject</label>
          <input type="text" id="contact-subject" name="subject" placeholder="Subject" data-field="subject" />
        </div>
        <div class="form-group">
          <label for="contact-message-body" id="label-contact-message">Message *</label>
          <textarea id="contact-message-body" name="message" required placeholder="Your message" data-field="message"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="contact-submit" data-cta="contact_submit" data-step="send_message">Send Message</button>
        </div>
      </form>
    </section>
  </main>
